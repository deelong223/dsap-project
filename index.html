<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>終末地抽卡計算機 Endfield gacha calculator</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            color: #f5f5f5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .header {
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 0.5rem;
            color: #d4d4d4;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        @media (min-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .card {
            background: #121212;
            border-radius: 1.5rem;
            border: 1px solid #262626;
            padding: 1.75rem;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #e5e5e5;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #a3a3a3;
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #262626;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            color: #f5f5f5;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .divider {
            border-top: 1px solid #262626;
            margin: 1.5rem 0;
        }

        .hint {
            font-size: 0.875rem;
            color: #737373;
            margin-bottom: 1rem;
        }

        .banner-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .banner-label {
            width: 5rem;
            color: #a3a3a3;
        }

        .banner-item input {
            flex: 1;
            background: #0a0a0a;
            border: 1px solid #262626;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            color: #f5f5f5;
            font-size: 1rem;
        }

        .banner-item input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .calculate-btn {
            width: 100%;
            margin-top: 1.5rem;
            background: #3b82f6;
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.875rem;
            border-radius: 1rem;
            font-size: 1rem;
            cursor: pointer;
        }

        .calculate-btn:hover:not(:disabled) {
            background: #2563eb;
        }

        .calculate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 350px;
            text-align: center;
        }

        .result-label {
            color: #a3a3a3;
            margin-bottom: 1rem;
        }

        .result-value {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .result-sub {
            margin-top: 1rem;
            color: #a3a3a3;
        }

        .placeholder-text {
            color: #525252;
            font-size: 1.1rem;
        }

        .threshold-hint {
            font-size: 0.75rem;
            color: #737373;
            margin-top: 0.3rem;
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="header">
            <h1>終末地抽卡計算機</h1>
            <h2>Arknights: Endfield Gacha Probability Calculator</h2>
        </div>

        <div class="main-grid">

            <!-- 左側 -->
            <div class="card">

                <div class="card-title">Current State (當前情況)</div>

                <div class="form-group">
                    <label>Initial Pity (0~79)</label>
                    <input type="text" id="initialPity" value="0">
                </div>

                <div class="form-group">
                    <label>Budget (0~5000)</label>
                    <input type="text" id="budget" value="0">
                </div>

                <div class="form-group">
                    <label>Strategy Threshold (0~59)</label>
                    <input type="text" id="threshold" value="47">

                    <div class="threshold-hint">
                        達成目標後是否繼續抽滿60抽
                    </div>

                    <div class="threshold-hint">
                        Continue pulling to 60 after reaching target
                    </div>
                </div>

                <div class="divider"></div>

                <div class="card-title">Banner Targets</div>

                <div class="hint">
                    valid number: 0~6
                </div>

                <div id="bannerContainer"></div>

                <button id="calculateBtn" class="calculate-btn">
                    Calculate Probability
                </button>

            </div>

            <!-- 右側 -->
            <div class="card result-card">

                <div class="result-label">
                    Success Probability
                </div>

                <div id="resultDisplay" class="placeholder-text">
                    點擊計算查看結果
                </div>

                <div id="resultSub" class="result-sub"></div>

            </div>

        </div>
    </div>

    <script>

        // ===== 基本設定 =====

        const BANNER_COUNT = 5;

        const PITY_MIN = 0;
        const PITY_MAX = 79;

        const BUDGET_MIN = 0;
        const BUDGET_MAX = 5000;

        const TARGET_MIN = 0;
        const TARGET_MAX = 6;

        const THRESHOLD_MIN = 0;
        const THRESHOLD_MAX = 59;

        // ===== 預設值 =====

        const DEFAULT_PITY = 0;
        const DEFAULT_BUDGET = 0;
        const DEFAULT_THRESHOLD = 47;
        const DEFAULT_TARGET = 0;

        // null = 空白
        let banners = Array(BANNER_COUNT).fill(null);

        // ===== WASM =====

        let calculateFunc = null;
        let setThresholdFunc = null;

        // ===== DOM =====

        const bannerContainer = document.getElementById('bannerContainer');

        const calculateBtn = document.getElementById('calculateBtn');

        const initialPityInput = document.getElementById('initialPity');
        const budgetInput = document.getElementById('budget');
        const thresholdInput = document.getElementById('threshold');

        const resultDisplay = document.getElementById('resultDisplay');
        const resultSub = document.getElementById('resultSub');

        // ===== 工具 =====

        function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
        }

        // 空白 -> defaultValue
        function getNumberWithDefault(input, min, max, defaultValue = 0) {

            const raw = input.value.trim();

            if (raw === "") {
                return defaultValue;
            }

            const num = parseInt(raw, 10);

            if (isNaN(num)) {
                return defaultValue;
            }

            return clamp(num, min, max);
        }

        // ===== 輸入修正 =====

        function normalizeInput(input, min, max) {

            const raw = input.value.trim();

            // 空白保留空白
            if (raw === "") {
                return;
            }

            const num = parseInt(raw, 10);

            if (isNaN(num)) {
                input.value = "";
                return;
            }

            input.value = String(clamp(num, min, max));
        }

        // ===== Banner =====

        function renderBanners() {

            bannerContainer.innerHTML = '';

            for (let i = 0; i < BANNER_COUNT; i++) {

                const val =
                    banners[i] === null
                        ? ""
                        : banners[i];

                const div = document.createElement('div');

                div.className = 'banner-item';

                div.innerHTML = `
                    <span class="banner-label">
                        Banner ${i + 1}
                    </span>

                    <input
                        type="text"
                        value="${val}"
                        data-index="${i}"
                        class="banner-input"
                    >
                `;

                bannerContainer.appendChild(div);
            }

            document
                .querySelectorAll('.banner-input')
                .forEach(input => {

                    input.addEventListener('input', function () {

                        const idx = Number(this.dataset.index);

                        const raw = this.value.trim();

                        if (raw === "") {
                            banners[idx] = null;
                            return;
                        }

                        const num = parseInt(raw, 10);

                        if (isNaN(num)) {
                            banners[idx] = null;
                            return;
                        }

                        banners[idx] =
                            clamp(num, TARGET_MIN, TARGET_MAX);
                    });

                    input.addEventListener('blur', function () {

                        const idx = Number(this.dataset.index);

                        const raw = this.value.trim();

                        if (raw === "") {
                            banners[idx] = null;
                            this.value = "";
                            return;
                        }

                        const num = parseInt(raw, 10);

                        if (isNaN(num)) {
                            banners[idx] = null;
                            this.value = "";
                            return;
                        }

                        const val =
                            clamp(num, TARGET_MIN, TARGET_MAX);

                        banners[idx] = val;

                        this.value = String(val);
                    });

                });
        }

        // ===== 結果 =====

        function updateResult(prob) {

            const percent =
                (Math.min(1, prob) * 100).toFixed(4);

            resultDisplay.innerHTML =
                `<div class="result-value">${percent}%</div>`;

            resultSub.innerHTML =
                `You have ${percent}% chance to get your target.`;
        }

        function showError(msg) {

            resultDisplay.innerHTML =
                `<div class="placeholder-text" style="color:#ef4444;">${msg}</div>`;

            resultSub.innerHTML = '';
        }

        // ===== 計算 =====

        function calculateMulti() {

            if (!calculateFunc) {
                showError('WASM 尚未加載完成');
                return;
            }

            const initialPity =
                getNumberWithDefault(
                    initialPityInput,
                    PITY_MIN,
                    PITY_MAX,
                    DEFAULT_PITY
                );

            const initialBudget =
                getNumberWithDefault(
                    budgetInput,
                    BUDGET_MIN,
                    BUDGET_MAX,
                    DEFAULT_BUDGET
                );

            const targets =
                banners.map(
                    b => b ?? DEFAULT_TARGET
                );

            try {

                const targetArray =
                    new Int32Array(targets);

                const ptr =
                    Module._malloc(targetArray.length * 4);

                for (let i = 0; i < targetArray.length; i++) {

                    Module.setValue(
                        ptr + i * 4,
                        targetArray[i],
                        'i32'
                    );
                }

                const result =
                    calculateFunc(
                        ptr,
                        targetArray.length,
                        initialPity,
                        initialBudget
                    );

                Module._free(ptr);

                updateResult(result);

            } catch (e) {

                console.error(e);

                showError(
                    '計算錯誤: ' + e.message
                );
            }
        }

        // ===== WASM 初始化 =====

        function initWasm() {

            if (
                typeof Module !== 'undefined'
                && Module.cwrap
            ) {

                calculateFunc =
                    Module.cwrap(
                        'calculate',
                        'number',
                        ['number', 'number', 'number', 'number']
                    );

                setThresholdFunc =
                    Module.cwrap(
                        'setThreshold',
                        null,
                        ['number']
                    );

                const threshold =
                    getNumberWithDefault(
                        thresholdInput,
                        THRESHOLD_MIN,
                        THRESHOLD_MAX,
                        DEFAULT_THRESHOLD
                    );

                setThresholdFunc(threshold);

                calculateBtn.disabled = false;

            } else {

                setTimeout(initWasm, 100);
            }
        }

        // ===== 事件 =====

        calculateBtn.addEventListener(
            'click',
            calculateMulti
        );

        initialPityInput.addEventListener(
            'blur',
            () => normalizeInput(
                initialPityInput,
                PITY_MIN,
                PITY_MAX
            )
        );

        budgetInput.addEventListener(
            'blur',
            () => normalizeInput(
                budgetInput,
                BUDGET_MIN,
                BUDGET_MAX
            )
        );

        thresholdInput.addEventListener(
            'blur',
            () => {

                normalizeInput(
                    thresholdInput,
                    THRESHOLD_MIN,
                    THRESHOLD_MAX
                );

                const val =
                    getNumberWithDefault(
                        thresholdInput,
                        THRESHOLD_MIN,
                        THRESHOLD_MAX,
                        DEFAULT_THRESHOLD
                    );

                if (setThresholdFunc) {
                    setThresholdFunc(val);
                }
            }
        );

        // ===== 啟動 =====

        renderBanners();

        calculateBtn.disabled = true;

        setTimeout(initWasm, 500);

    </script>

    <script src="gacha.js"></script>

</body>
</html>
